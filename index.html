<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cal Tracker">
<meta name="theme-color" content="#0a0a0f">
<title>Cal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0f; color: #e2e8f0; font-family: 'DM Mono', 'Courier New', monospace; -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { display: none; }

#app { max-width: 480px; margin: 0 auto; padding: 24px 16px 48px; }

.header { margin-bottom: 28px; animation: fadeUp 0.4s ease both; }
.header h1 { font-family: ‘Playfair Display’, serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
.header .date { font-size: 11px; color: #64748b; margin-top: 4px; letter-spacing: 0.1em; text-transform: uppercase; }

.card { background: #111118; border: 1px solid #1e1e2e; border-radius: 16px; padding: 20px 24px; margin-bottom: 20px; animation: fadeUp 0.4s ease both; }

/* Progress */
.progress-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
.cal-total { font-size: 40px; font-weight: 500; color: #fff; line-height: 1; }
.cal-label { font-size: 12px; color: #64748b; margin-top: 4px; }
.cal-goal { color: #a78bfa; cursor: pointer; border-bottom: 1px dashed #a78bfa; }
.cal-remaining { font-size: 22px; font-weight: 500; text-align: right; }
.cal-remaining-label { font-size: 11px; color: #64748b; }
.bar-track { height: 6px; background: #1e1e2e; border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease, background 0.5s ease; }

/* Scan */
.section-label { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }
.scan-upload-btn { width: 100%; background: #0a150f; border: 1px dashed #2d6a4f; border-radius: 10px; padding: 18px; color: #4ade80; font-size: 13px; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
.scan-upload-btn:hover { background: #0e4429; border-color: #4ade80; }
.scan-preview-wrap { position: relative; width: 100%; border-radius: 10px; overflow: hidden; max-height: 180px; }
.scan-preview-img { width: 100%; object-fit: cover; max-height: 180px; display: block; }
.scan-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.spinner { width: 28px; height: 28px; border: 2px solid #4ade80; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
.scanning-text { font-size: 12px; color: #4ade80; animation: pulse 1.5s ease infinite; }
.result-img { width: 100%; border-radius: 10px; max-height: 160px; object-fit: cover; margin-bottom: 12px; }
.result-box { background: #0a0a0f; border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
.result-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; }
.result-item + .result-item { border-top: 1px solid #1a1a2e; }
.result-item-name { font-size: 13px; color: #e2e8f0; }
.result-item-note { font-size: 11px; color: #475569; margin-top: 2px; }
.result-item-cal { font-size: 15px; color: #a78bfa; font-weight: 500; margin-left: 12px; white-space: nowrap; }
.result-total { display: flex; justify-content: space-between; padding-top: 8px; margin-top: 4px; border-top: 1px solid #1e1e2e; }
.result-total-label { font-size: 12px; color: #64748b; }
.result-total-cal { font-size: 15px; color: #4ade80; font-weight: 500; }
.result-confidence { font-size: 10px; color: #334155; margin-top: 8px; }
.result-actions { display: flex; gap: 8px; }
.log-btn { flex: 1; background: #166534; border: none; border-radius: 8px; padding: 10px; color: #4ade80; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; transition: background 0.15s; }
.log-btn:hover { background: #15803d; }
.dismiss-btn { background: #1e1e2e; border: none; border-radius: 8px; padding: 10px 16px; color: #64748b; font-size: 13px; cursor: pointer; font-family: inherit; }
.error-text { color: #f87171; font-size: 13px; text-align: center; margin-bottom: 12px; }
.retry-btn { background: #1e1e2e; border: none; border-radius: 8px; padding: 8px 20px; color: #94a3b8; font-size: 12px; cursor: pointer; font-family: inherit; display: block; margin: 0 auto; }

/* AI Search */
.search-wrap { position: relative; }
.search-input { width: 100%; background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 10px; padding: 11px 44px 11px 14px; color: #e2e8f0; font-size: 13px; font-family: inherit; transition: border 0.2s; }
.search-input:focus { outline: none; border-color: #a78bfa; }
.search-input::placeholder { color: #334155; }
.search-go-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: #6d28d9; border: none; border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s; font-size: 13px; }
.search-go-btn:hover { background: #7c3aed; }
.search-go-btn:disabled { background: #2d2d3e; cursor: default; }
.search-spinner { width: 14px; height: 14px; border: 2px solid #a78bfa; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
.search-results { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.search-result-item { display: flex; justify-content: space-between; align-items: center; background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
.search-result-item:hover { border-color: #a78bfa; background: #0f0f1a; }
.search-result-name { font-size: 13px; color: #e2e8f0; }
.search-result-note { font-size: 11px; color: #475569; margin-top: 2px; }
.search-result-right { display: flex; align-items: center; gap: 8px; }
.search-result-cal { font-size: 14px; color: #a78bfa; font-weight: 500; white-space: nowrap; }
.search-add-chip { background: #166534; border: none; border-radius: 6px; padding: 4px 10px; color: #4ade80; font-size: 11px; cursor: pointer; font-family: inherit; }
.search-error { font-size: 12px; color: #f87171; margin-top: 8px; }
.search-hint { font-size: 11px; color: #334155; margin-top: 8px; text-align: center; }

/* Quick adds */
.quick-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.quick-chip { background: #0f0f1a; border: 1px solid #1e1e2e; border-radius: 8px; padding: 7px 12px; color: #cbd5e1; font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.quick-chip:hover { background: #1e1b4b; border-color: #a78bfa; transform: translateY(-1px); }
.quick-cal { color: #a78bfa; }
.quick-sep { color: #64748b; }

/* Custom add */
.custom-row { display: flex; gap: 8px; }
.custom-row input { background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 8px; padding: 9px 12px; color: #e2e8f0; font-size: 13px; font-family: inherit; transition: border 0.2s; }
.custom-row input:focus { outline: none; border-color: #a78bfa; }
.custom-row input.name-input { flex: 1; }
.custom-row input.cal-input { width: 72px; }
.add-btn { background: #6d28d9; border: none; border-radius: 8px; padding: 9px 16px; color: #fff; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; transition: background 0.15s; }
.add-btn:hover { background: #7c3aed; }

/* Log */
.log-empty { color: #334155; font-size: 13px; text-align: center; padding: 32px 0; }
.log-entry { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid #0f0f1a; }
.log-entry-name { font-size: 14px; color: #e2e8f0; }
.log-entry-time { font-size: 11px; color: #334155; margin-top: 2px; }
.log-entry-right { display: flex; align-items: center; gap: 12px; }
.log-entry-cal { font-size: 16px; color: #a78bfa; font-weight: 500; }
.del-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 18px; opacity: 0; transition: opacity 0.15s; padding: 0 4px; line-height: 1; }
.log-entry:hover .del-btn { opacity: 1; }

/* Goal edit */
.goal-input { width: 64px; background: transparent; border: none; border-bottom: 1px solid #a78bfa; color: #a78bfa; font-size: 12px; font-family: inherit; padding: 0 2px; outline: none; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes pop { 0%{transform:scale(0.95);opacity:0} 60%{transform:scale(1.02)} 100%{transform:scale(1);opacity:1} }
.pop { animation: pop 0.3s ease; }
</style>

</head>
<body>
<div id="app">
  <div class="header">
    <h1>cal tracker</h1>
    <div class="date" id="dateLabel"></div>
  </div>

  <!-- Progress -->

  <div class="card" style="animation-delay:0.05s">
    <div class="progress-top">
      <div>
        <div class="cal-total" id="totalCal">0</div>
        <div class="cal-label">of <span class="cal-goal" id="goalLabel" onclick="startEditGoal()">1800</span> kcal goal</div>
      </div>
      <div>
        <div class="cal-remaining" id="remaining" style="color:#4ade80">1800</div>
        <div class="cal-remaining-label" id="remainingLabel">remaining</div>
      </div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%;background:#4ade80"></div></div>
  </div>

  <!-- AI Food Search -->

  <div class="card" style="animation-delay:0.08s">
    <div class="section-label">search food</div>
    <div class="search-wrap">
      <input
        class="search-input"
        id="searchInput"
        placeholder="e.g. grande iced latte, chipotle bowl, 2 eggs..."
        onkeydown="if(event.key==='Enter')doSearch()"
      >
      <button class="search-go-btn" id="searchBtn" onclick="doSearch()" title="Search">
        <span id="searchBtnIcon">→</span>
      </button>
    </div>
    <div id="searchResults"></div>
  </div>

  <!-- Scan -->

  <div class="card" style="animation-delay:0.1s">
    <div class="section-label">scan food</div>
    <div id="scanIdle">
      <button class="scan-upload-btn" onclick="document.getElementById('photoInput').click()">
        <span style="font-size:22px">📸</span>
        <span>take or upload a photo to get calories</span>
      </button>
    </div>
    <div id="scanScanning" style="display:none">
      <div class="scan-preview-wrap">
        <img id="scanPreviewImg" class="scan-preview-img" src="" alt="" style="filter:brightness(0.45)">
        <div class="scan-overlay">
          <div class="spinner"></div>
          <div class="scanning-text">analyzing your food...</div>
        </div>
      </div>
    </div>
    <div id="scanResult" style="display:none">
      <img id="resultImg" class="result-img" src="" alt="">
      <div class="result-box" id="resultBox"></div>
      <div class="result-actions">
        <button class="log-btn" id="logScanBtn" onclick="logScan()">✓ log this</button>
        <button class="dismiss-btn" onclick="dismissScan()">✕</button>
      </div>
    </div>
    <div id="scanError" style="display:none">
      <div class="error-text">couldn't read that — try a clearer photo</div>
      <button class="retry-btn" onclick="dismissScan()">try again</button>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
  </div>

  <!-- Quick adds -->

  <div style="margin-bottom:20px;animation:fadeUp 0.4s 0.15s ease both">
    <div class="section-label">quick add</div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>

  <!-- Custom add -->

  <div class="card" style="animation-delay:0.2s">
    <div class="section-label">custom entry</div>
    <div class="custom-row">
      <input class="name-input" id="customName" placeholder="food name" onkeydown="if(event.key==='Enter')handleAdd()">
      <input class="cal-input" id="customCal" placeholder="kcal" type="number" onkeydown="if(event.key==='Enter')handleAdd()">
      <button class="add-btn" onclick="handleAdd()">add</button>
    </div>
  </div>

  <!-- Log -->

  <div style="animation:fadeUp 0.4s 0.25s ease both">
    <div class="section-label">today's log</div>
    <div id="logList"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'zara-cal-log-v1';
const QUICK_ADDS = [
  { name: 'Soy latte w/ SF syrup', cal: 150, emoji: '☕' },
  { name: 'Protein bar', cal: 200, emoji: '🍫' },
  { name: 'Banana', cal: 105, emoji: '🍌' },
  { name: 'Greek yogurt', cal: 130, emoji: '🥛' },
  { name: 'Chicken & rice', cal: 420, emoji: '🍚' },
  { name: 'Salad', cal: 180, emoji: '🥗' },
];

let state = { log: {}, goal: 1800 };
let scanItems = [];
let scanImgUrl = '';
let editingGoal = false;
let searchLoading = false;

function getTodayKey() { return new Date().toISOString().slice(0, 10); }
function formatTime(iso) { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) state = JSON.parse(s); } catch {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ── Midnight auto-reset ──────────────────────────────────────────────────────
function scheduleMidnightReset() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0); // next midnight
  const msUntilMidnight = midnight - now;
  setTimeout(() => {
    // clear today's log (the new day's key will be different anyway, but let's also prune old days)
    pruneOldDays();
    renderAll();
    scheduleMidnightReset(); // reschedule for the next midnight
  }, msUntilMidnight);
}

function pruneOldDays() {
  const today = getTodayKey();
  // keep only last 7 days to avoid bloat
  const keys = Object.keys(state.log || {});
  keys.forEach(k => { if (k < today) delete state.log[k]; });
  saveState();
}

// ── Entries ──────────────────────────────────────────────────────────────────
function addEntry(name, cal) {
  const today = getTodayKey();
  if (!state.log[today]) state.log[today] = [];
  state.log[today].push({ id: Date.now(), name, cal: Number(cal), time: new Date().toISOString() });
  saveState();
  renderAll();
}

function removeEntry(id) {
  const today = getTodayKey();
  state.log[today] = (state.log[today] || []).filter(e => e.id !== id);
  saveState();
  renderAll();
}

function handleAdd() {
  const n = document.getElementById('customName').value.trim();
  const c = document.getElementById('customCal').value;
  if (!n || !c || isNaN(Number(c))) return;
  addEntry(n, c);
  document.getElementById('customName').value = '';
  document.getElementById('customCal').value = '';
}

// ── Goal ─────────────────────────────────────────────────────────────────────
function startEditGoal() {
  if (editingGoal) return;
  editingGoal = true;
  const el = document.getElementById('goalLabel');
  el.innerHTML = `<input class="goal-input" id="goalInput" value="${state.goal}" type="number" onblur="saveGoal()" onkeydown="if(event.key==='Enter')saveGoal()">`;
  setTimeout(() => { const inp = document.getElementById('goalInput'); if (inp) inp.focus(); }, 10);
}

function saveGoal() {
  const inp = document.getElementById('goalInput');
  if (inp) { const g = Number(inp.value); if (!isNaN(g) && g > 0) state.goal = g; }
  editingGoal = false;
  saveState();
  renderAll();
}

// ── AI Food Search ────────────────────────────────────────────────────────────
async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query || searchLoading) return;

  searchLoading = true;
  const btn = document.getElementById('searchBtn');
  const iconEl = document.getElementById('searchBtnIcon');
  btn.disabled = true;
  iconEl.className = 'search-spinner';
  iconEl.textContent = '';

  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = '';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `You are a nutrition expert calorie lookup tool. The user searched for: "${query}"

Respond ONLY with valid JSON, no markdown, no backticks, no extra text:
{"items":[{"name":"specific food name","cal":000,"note":"serving size or detail"}]}

Rules:
- Return 1–4 items depending on query (e.g. "2 eggs" = 1 item, "chipotle bowl" = 1 item with note, "breakfast" = a few options)
- Be specific with names and realistic with calories
- note should be the serving size (e.g. "1 cup", "medium", "16 fl oz")
- If query is ambiguous, return a couple of common variations`
        }]
      })
    });

    const data = await resp.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());

    if (!parsed.items || parsed.items.length === 0) throw new Error('no results');

    resultsEl.innerHTML = `<div class="search-results">` +
      parsed.items.map((item, i) =>
        `<div class="search-result-item" onclick="addFromSearch('${item.name.replace(/'/g,"\\'")}', ${item.cal}, ${i})">
          <div>
            <div class="search-result-name">${item.name}</div>
            ${item.note ? `<div class="search-result-note">${item.note}</div>` : ''}
          </div>
          <div class="search-result-right">
            <div class="search-result-cal">${item.cal} kcal</div>
            <button class="search-add-chip" onclick="event.stopPropagation();addFromSearch('${item.name.replace(/'/g,"\\'")}', ${item.cal}, ${i})">+ log</button>
          </div>
        </div>`
      ).join('') +
      `<div class="search-hint">tap any item to log it</div>` +
      `</div>`;

  } catch {
    document.getElementById('searchResults').innerHTML =
      `<div class="search-error">couldn't find that — try being more specific</div>`;
  } finally {
    searchLoading = false;
    btn.disabled = false;
    iconEl.className = '';
    iconEl.textContent = '→';
  }
}

function addFromSearch(name, cal, idx) {
  addEntry(name, cal);
  // briefly highlight the item then clear results
  const items = document.querySelectorAll('.search-result-item');
  if (items[idx]) {
    items[idx].style.borderColor = '#4ade80';
    items[idx].style.background = '#0a150f';
  }
  setTimeout(() => {
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('searchInput').value = '';
  }, 600);
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

  const today = getTodayKey();
  const entries = state.log[today] || [];
  const total = entries.reduce((s, e) => s + e.cal, 0);
  const pct = Math.min((total / state.goal) * 100, 100);
  const rem = state.goal - total;
  const barColor = pct < 60 ? '#4ade80' : pct < 85 ? '#facc15' : pct < 100 ? '#fb923c' : '#f87171';

  document.getElementById('totalCal').textContent = total.toLocaleString();
  if (!editingGoal) document.getElementById('goalLabel').textContent = state.goal.toLocaleString();
  document.getElementById('remaining').textContent = (rem < 0 ? '+' : '') + Math.abs(rem).toLocaleString();
  document.getElementById('remaining').style.color = rem < 0 ? '#f87171' : '#4ade80';
  document.getElementById('remainingLabel').textContent = rem < 0 ? 'over' : 'remaining';
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('barFill').style.background = barColor;

  document.getElementById('quickGrid').innerHTML = QUICK_ADDS.map(q =>
    `<button class="quick-chip" onclick="addEntry('${q.name.replace(/'/g,"\\'")}',${q.cal})">
      ${q.emoji} ${q.name} <span class="quick-sep">·</span> <span class="quick-cal">${q.cal}</span>
    </button>`
  ).join('');

  const logEl = document.getElementById('logList');
  if (entries.length === 0) {
    logEl.innerHTML = '<div class="log-empty">nothing logged yet</div>';
  } else {
    logEl.innerHTML = [...entries].reverse().map(e =>
      `<div class="log-entry pop">
        <div>
          <div class="log-entry-name">${e.name}</div>
          <div class="log-entry-time">${formatTime(e.time)}</div>
        </div>
        <div class="log-entry-right">
          <div class="log-entry-cal">${e.cal}</div>
          <button class="del-btn" onclick="removeEntry(${e.id})">×</button>
        </div>
      </div>`
    ).join('');
  }
}

// ── Photo scan ────────────────────────────────────────────────────────────────
async function handlePhoto(input) {
  const file = input.files?.[0];
  if (!file) return;
  input.value = '';

  const base64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });

  scanImgUrl = URL.createObjectURL(file);
  document.getElementById('scanPreviewImg').src = scanImgUrl;
  showScanState('scanning');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: file.type || 'image/jpeg', data: base64 } },
            { type: 'text', text: `You are a nutrition expert. Estimate calories from this food photo.
Respond ONLY with JSON, no markdown, no backticks:
{"items":[{"name":"food name","cal":000,"note":"portion note"}],"total":000,"confidence":"low|medium|high"}
List each food item separately. Be specific and realistic.` }
          ]
        }]
      })
    });

    const data = await resp.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    scanItems = parsed.items;

    document.getElementById('resultImg').src = scanImgUrl;
    let html = parsed.items.map(item =>
      `<div class="result-item">
        <div><div class="result-item-name">${item.name}</div>${item.note ? `<div class="result-item-note">${item.note}</div>` : ''}</div>
        <div class="result-item-cal">${item.cal} kcal</div>
      </div>`
    ).join('');
    if (parsed.items.length > 1) {
      html += `<div class="result-total"><span class="result-total-label">total</span><span class="result-total-cal">${parsed.total} kcal</span></div>`;
    }
    html += `<div class="result-confidence">confidence: ${parsed.confidence}</div>`;
    document.getElementById('resultBox').innerHTML = html;
    document.getElementById('logScanBtn').textContent = `✓ log ${parsed.items.length > 1 ? 'all ' + parsed.items.length + ' items' : 'this'}`;
    showScanState('result');
  } catch {
    showScanState('error');
  }
}

function showScanState(s) {
  document.getElementById('scanIdle').style.display = s === 'idle' ? '' : 'none';
  document.getElementById('scanScanning').style.display = s === 'scanning' ? '' : 'none';
  document.getElementById('scanResult').style.display = s === 'result' ? '' : 'none';
  document.getElementById('scanError').style.display = s === 'error' ? '' : 'none';
}

function logScan() {
  scanItems.forEach(item => addEntry(item.name, item.cal));
  dismissScan();
}

function dismissScan() {
  scanItems = [];
  scanImgUrl = '';
  showScanState('idle');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadState();
pruneOldDays();
renderAll();
scheduleMidnightReset();
</script>

</body>
</html>
